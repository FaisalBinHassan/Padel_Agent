name: Check Padel Court Availability

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub best-effort)
    - cron: "1-59/5 * * * *" # offset by 1 min as backup in case first is skipped
  workflow_dispatch:          # manual trigger + external cron-job.org webhook

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check courts
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python main.py --once
